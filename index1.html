<html>
<head>
  <title>site</title>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbyjfHUg4M-GXgLVyf1sMmtUqI3QZP2sFXfMQu_rJ8jnNbQcJ7oHnRbJ94zva9Wb2Wjy/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
